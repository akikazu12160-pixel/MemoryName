<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名前あてゲーム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen" class="screen">
  <div class="login-wrap">
    <div class="login-logo">
      <span class="logo-icon">🧠</span>
      <h1 class="logo-title">名前あてゲーム</h1>
      <p class="logo-sub">大切な人の顔と名前を覚えよう</p>
    </div>

    <div class="login-card">
      <div id="login-form">
        <div class="field-group">
          <label class="field-label">ユーザー名</label>
          <input type="text" id="login-username" class="field-input" placeholder="ユーザー名を入力">
        </div>
        <div class="field-group">
          <label class="field-label">パスワード</label>
          <input type="password" id="login-password" class="field-input" placeholder="パスワードを入力">
        </div>
        <p id="login-error" class="error-text"></p>
        <button class="btn btn-primary btn-full" onclick="login()">ログイン</button>
        <p class="switch-link">アカウントをお持ちでない方は <a href="#" onclick="showRegister()">新規登録</a></p>
      </div>

      <div id="register-form" style="display:none;">
        <div class="field-group">
          <label class="field-label">ユーザー名</label>
          <input type="text" id="reg-username" class="field-input" placeholder="ユーザー名を入力">
        </div>
        <div class="field-group">
          <label class="field-label">パスワード</label>
          <input type="password" id="reg-password" class="field-input" placeholder="パスワードを入力">
        </div>
        <div class="field-group">
          <label class="field-label">パスワード（確認）</label>
          <input type="password" id="reg-password2" class="field-input" placeholder="もう一度入力">
        </div>
        <p id="register-error" class="error-text"></p>
        <button class="btn btn-primary btn-full" onclick="register()">登録する</button>
        <p class="switch-link"><a href="#" onclick="showLogin()">← ログインに戻る</a></p>
      </div>
    </div>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen" class="screen" style="display:none;">

  <!-- ヘッダー -->
  <header class="app-header">
    <div class="header-left">
      <span class="header-logo">🧠</span>
      <span class="header-title">名前あてゲーム</span>
    </div>
    <div class="header-right">
      <span id="header-user" class="header-user"></span>
      <button class="btn btn-ghost" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <!-- タブナビ -->
  <nav class="tab-nav" id="tab-bar"></nav>

  <!-- コンテンツ -->
  <main class="main-content">

    <!-- ===== ゲームタブ ===== -->
    <div id="tab-game" class="tab-panel">

      <!-- 開始前 -->
      <div id="game-start" class="game-start-screen">
        <div class="game-start-inner">
          <p class="game-start-icon">🎮</p>
          <h2 class="game-start-title">ゲームを始めよう</h2>
          <p class="game-start-desc">写真を見て、名前を覚えて、正解を選ぼう！</p>
          <button id="start-btn" class="btn btn-primary btn-large" onclick="startMemoryGame()">ゲーム開始</button>
        </div>
      </div>

      <!-- 記憶フェーズ -->
      <div id="game-memorize" class="game-phase" style="display:none;">
        <div class="game-phase-header">
          <p class="phase-label">📸 この2人を覚えてください！</p>
          <p id="memory-countdown" class="countdown-text"></p>
        </div>
        <div class="photo-pair" id="memorize-grid"></div>
      </div>

      <!-- 回答フェーズ -->
      <div id="game-answer" class="game-phase" style="display:none;">
        <div class="game-phase-header">
          <p class="phase-label">❓ どっちでしょう？</p>
          <p id="answer-question" class="answer-question-text"></p>
        </div>
        <div class="photo-pair" id="answer-grid"></div>
      </div>

      <!-- 正解画面 -->
      <div id="game-correct" class="game-phase result-screen correct-screen" style="display:none;">
        <div class="result-banner correct-banner">
          <p class="result-kanji">正　解！！</p>
        </div>
        <div class="result-body">
          <div class="result-photo-wrap">
            <img id="correct-photo" class="result-photo" src="" alt="">
            <p id="correct-name" class="result-name"></p>
          </div>
          <div class="result-detail-panel">
            <p class="detail-label">詳細</p>
            <div id="correct-detail" class="detail-content"></div>
          </div>
        </div>
        <div class="result-actions">
          <span id="correct-photo-label" class="action-label">「写真 1」</span>
          <button class="btn btn-ghost" onclick="goHome()">台</button>
          <button class="btn btn-primary" onclick="startMemoryGame()">次のゲームへ →</button>
        </div>
      </div>

      <!-- 不正解画面 -->
      <div id="game-wrong" class="game-phase result-screen wrong-screen" style="display:none;">
        <div class="result-banner wrong-banner">
          <p class="result-kanji">不正解…</p>
        </div>
        <div class="wrong-split">
          <div class="wrong-half">
            <p class="wrong-half-label">あなたの回答 ✗</p>
            <img id="wrong-chosen-photo" class="wrong-photo" src="" alt="">
            <p id="wrong-chosen-name" class="wrong-name wrong-name-bad"></p>
          </div>
          <div class="wrong-divider">→</div>
          <div class="wrong-half">
            <p class="wrong-half-label">正解 ✓</p>
            <img id="wrong-correct-photo" class="wrong-photo" src="" alt="">
            <p id="wrong-correct-name" class="wrong-name wrong-name-good"></p>
          </div>
        </div>
        <div class="result-actions">
          <button class="btn btn-ghost" onclick="goHome()">ホームへ</button>
          <button class="btn btn-primary" onclick="startMemoryGame()">もう一度 →</button>
        </div>
      </div>

    </div>

    <!-- ===== 写真登録タブ（利用者・家族） ===== -->
    <div id="tab-register" class="tab-panel">
      <div class="form-card">
        <h2 class="card-title">📷 写真を登録</h2>
        <div class="field-group">
          <label class="field-label">名前</label>
          <input type="text" id="person-name" class="field-input" placeholder="名前を入力">
        </div>
        <div class="field-group">
          <label class="field-label">写真</label>
          <label class="file-drop" id="file-drop">
            <span id="file-drop-label">📁 タップして写真を選ぶ</span>
            <input type="file" id="person-image" accept="image/*" onchange="previewFile(this, 'file-drop-label')">
          </label>
        </div>
        <button class="btn btn-primary btn-full" onclick="addPerson()">登録する</button>
      </div>
    </div>

    <!-- ===== 登録一覧タブ ===== -->
    <div id="tab-list" class="tab-panel">
      <div class="form-card">
        <h2 class="card-title">📋 登録一覧</h2>
        <div id="admin-user-select" style="display:none; margin-bottom:16px;">
          <label class="field-label">表示するユーザー</label>
          <select id="list-user-select" class="field-select" onchange="loadPeople()">
            <option value="">全員</option>
          </select>
        </div>
        <div id="registered-list" class="person-grid"></div>
      </div>
    </div>

    <!-- ===== 管理者：写真登録タブ ===== -->
    <div id="tab-admin-register" class="tab-panel">
      <div class="form-card">
        <h2 class="card-title">📷 写真を登録（管理者）</h2>
        <div class="field-group">
          <label class="field-label">登録先ユーザー</label>
          <select id="admin-owner-select" class="field-select"></select>
        </div>
        <div class="field-group">
          <label class="field-label">名前</label>
          <input type="text" id="admin-person-name" class="field-input" placeholder="名前を入力">
        </div>
        <div class="field-group">
          <label class="field-label">写真</label>
          <label class="file-drop">
            <span id="admin-file-drop-label">📁 タップして写真を選ぶ</span>
            <input type="file" id="admin-person-image" accept="image/*" onchange="previewFile(this, 'admin-file-drop-label')">
          </label>
        </div>
        <button class="btn btn-primary btn-full" onclick="adminAddPerson()">登録する</button>
      </div>
    </div>

    <!-- ===== ユーザー管理タブ ===== -->
    <div id="tab-users" class="tab-panel">
      <div class="form-card">
        <h2 class="card-title">👤 ユーザー管理</h2>
        <div class="field-group">
          <label class="field-label">ユーザー名</label>
          <input type="text" id="new-username" class="field-input" placeholder="ユーザー名を入力">
        </div>
        <div class="field-group">
          <label class="field-label">パスワード</label>
          <input type="password" id="new-password" class="field-input" placeholder="パスワードを入力">
        </div>
        <div class="field-group">
          <label class="field-label">ロール</label>
          <select id="new-role" class="field-select" onchange="toggleLinkedUser()">
            <option value="user">利用者</option>
            <option value="family">家族</option>
            <option value="admin">管理者</option>
          </select>
        </div>
        <div id="linked-user-group" class="field-group" style="display:none;">
          <label class="field-label">紐づける利用者</label>
          <select id="new-linked-user" class="field-select"></select>
        </div>
        <button class="btn btn-primary btn-full" onclick="createUser()">ユーザー作成</button>

        <div class="divider"></div>
        <div id="user-list" class="user-list"></div>
      </div>
    </div>

    <!-- ===== 記録タブ ===== -->
    <div id="tab-records" class="tab-panel">
      <div class="form-card">
        <h2 class="card-title">📊 ゲーム記録</h2>
        <div id="records-list"></div>
      </div>
    </div>

  </main>
</div>

<script src="MemoryName.js"></script>
<script>
function previewFile(input, labelId) {
  const file = input.files[0];
  if (file) {
    document.getElementById(labelId).textContent = '✅ ' + file.name;
  }
}
function goHome() {
  document.getElementById('game-start').style.display = 'flex';
  document.getElementById('game-correct').style.display = 'none';
  document.getElementById('game-wrong').style.display = 'none';
  document.getElementById('game-memorize').style.display = 'none';
  document.getElementById('game-answer').style.display = 'none';
}
</script>
</body>
</html>
